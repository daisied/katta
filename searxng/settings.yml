# SearXNG settings for Katta agent
use_default_settings: true

general:
  instance_name: "katta-search"

server:
  secret_key: "katta-searxng-secret-change-in-production"
  limiter: false
  public_instance: false
  image_proxy: false
  method: "GET"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

engines:
  # --- Major search engines ---
  - name: google
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: bing
    disabled: false
  - name: startpage
    disabled: false
  - name: mojeek
    disabled: false
  - name: qwant
    disabled: false
  - name: yep
    disabled: false
  # --- Social / community ---
  - name: reddit
    disabled: false
  # --- News ---
  - name: google news
    disabled: false
  - name: bing news
    disabled: false
  - name: brave.news
    disabled: false
  # --- Tech / dev ---
  - name: github
    disabled: false
  - name: stackoverflow
    disabled: false
  - name: pypi
    disabled: false
  - name: npm
    disabled: false
  - name: hackernews
    disabled: false
  # --- Knowledge ---
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false
  - name: arxiv
    disabled: false
  # --- Darknet (disabled) ---
  - name: ahmia
    disabled: true
  - name: torch
    disabled: true
